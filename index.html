<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deepayan Banik</title>
  <meta name="description" content="PhD candidate in Physics working on atmospheric and planetary fluid dynamics.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --fg: #d0d0d0;
      --muted: #858585;
      --border: #1e293b;
      --different1: #7bafc7;
      --different2: #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lexend Deca', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid #1e293b;
      position: sticky;
      top: 0;
      background: #0f172a;
      z-index: 100;
    }

    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .header-left { flex: 1; min-width: 0; }

    .site-name {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #f1f5f9;
    }

    .site-tagline {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 0.68rem;
      color: #64748b;
      margin-top: 0.18rem;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    nav { display: flex; gap: 2rem; flex-shrink: 0; }

    .tab-btn {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      color: rgba(255, 255, 255, 0.4);
      padding: 0.4rem 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #f1f5f9; }
    .tab-btn.active { color: #f1f5f9; border-bottom-color: #94a3b8; }

    /* ── MAIN ── */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 3.5rem 2rem 5rem;
    }

    .tab-content { display: none; animation: fadeIn 0.2s ease; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HOME ── */
    .card {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
      display: block;
    }

    .bio-label {
      font-size: 0.68rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .bio p {
      font-size: 0.86rem;
      line-height: 1.78;
      color: var(--fg);
      margin-bottom: 0.85rem;
    }

    .bio p:last-of-type { margin-bottom: 0; }

    .callout {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      font-size: 0.70rem;
      line-height: 1.65;
      color: var(--muted);
    }

    /* ── SHARED LABEL ── */
    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2.5rem 0 1rem;
    }

    /* ── RESEARCH AREAS ── */
    .research-areas {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .research-areas { grid-template-columns: 1fr; }
    }

    .research-area-card {
      background: #161616;
      padding: 1.2rem 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .research-area-card:hover { background: #1e2a3a; }
    .research-area-card:hover h4 { color: #f1f5f9; }
    .research-area-card:hover p { color: #94a3b8; }
    .research-area-card:hover .area-arrow { color: var(--different1); }

    .research-area-card h4 {
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .research-area-card p {
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .area-arrow {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: auto;
      padding-top: 0.6rem;
    }

    /* ── PUBLICATIONS ── */
    a {
      color: var(--different1);
      text-decoration: none;
    }

    .pub-list { list-style: none; }

    .pub-list li {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .pub-list li:first-child { border-top: 1px solid var(--border); }

    .pub-title {
      display: block;
      font-size: 0.88rem;
      line-height: 1.5;
      margin-bottom: 0.25rem;
    }

    .pub-authors {
      display: block;
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 0.15rem;
    }

    .pub-venue {
      display: block;
      font-size: 0.73rem;
      color: var(--muted);
    }

    /* ── DETAIL PAGE ── */
    .detail-page {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .detail-page.active { display: block; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.73rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem 0;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--fg); }

    .detail-title {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .detail-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .detail-section-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2rem 0 0.8rem;
    }

    .detail-body {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--fg);
      margin-bottom: 1rem;
    }

    .detail-hero-img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 2px;
      margin-bottom: 2rem;
      display: block;
    }

    .detail-pub-list { list-style: none; }

    .detail-pub-list li {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-pub-list li:first-child { border-top: 1px solid var(--border); }

    /* ── CONTACT ── */
    #contact > p {
      font-size: 0.88rem;
      line-height: 1.72;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .contact-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 3rem;
    }

    .contact-table td {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.86rem;
      vertical-align: top;
    }

    .contact-table tr:first-child td { border-top: 1px solid var(--border); }

    .contact-table .label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      width: 110px;
      padding-right: 1.5rem;
    }

    .contact-table a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .contact-table a:hover { border-color: var(--fg); }

    .contact-form h3 {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .contact-form label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 0.6rem 0.75rem;
      font-family: 'Lexend Deca', sans-serif;
      font-size: 0.86rem;
      color: var(--fg);
      margin-bottom: 1.2rem;
      transition: border-color 0.15s;
      outline: none;
    }

    .contact-form input:focus,
    .contact-form textarea:focus { border-color: var(--fg); }

    .contact-form textarea { resize: vertical; }

    .field-error {
      display: block;
      font-size: 0.72rem;
      color: #bb0000;
      margin-top: -0.9rem;
      margin-bottom: 0.8rem;
      min-height: 1em;
    }

    .submit-btn {
      background: var(--fg);
      color: var(--bg);
      border: none;
      padding: 0.65rem 1.8rem;
      font-family: 'Lexend Deca', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .submit-btn:hover { opacity: 0.7; }

    #form-status {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── JOURNEY ── */
    .journey-container {
      display: flex;
      flex-direction: column;
      padding-bottom: 5rem;
    }

    .journey-item {
      border: 1px solid var(--border);
      border-bottom: none;
      background: #0d1117;
      overflow: hidden;
      transition: background 0.15s;
    }

    .journey-item:last-child { border-bottom: 1px solid var(--border); }
    .journey-item.active { background: #111827; }

    .journey-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .journey-header:hover { background: #111827; }

    .journey-header::after {
      content: '+';
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--muted);
      flex-shrink: 0;
      font-family: monospace;
      line-height: 1;
    }

    .journey-item.active .journey-header::after { content: '−'; }

    .journey-year {
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      color: var(--different1);
      font-weight: 500;
      flex-shrink: 0;
      min-width: 7.5rem;
    }

    .journey-title { flex: 1; min-width: 0; }

    .journey-degree {
      font-size: 0.86rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--fg);
    }

    .journey-inst {
      font-size: 0.74rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-top: 0.1rem;
    }

    .journey-details {
      display: block;
      max-height: 0;
      overflow: hidden;
      padding: 0 1.4rem;
      border-top: 1px solid transparent;
      transition: max-height 0.4s ease, padding-bottom 0.4s ease, border-color 0.2s ease;
    }

    .journey-item.active .journey-details {
      max-height: 1400px;
      padding-bottom: 1.4rem;
      border-top-color: var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .card { grid-template-columns: 1fr; }
      .avatar { width: 80px; height: 80px; }
      main { padding: 2.5rem 1.2rem 4rem; }
      .header-inner { padding: 0.75rem 1.2rem; flex-wrap: wrap; }
      .site-tagline { white-space: normal; }
      .journey-header { gap: 0.9rem; }
      .journey-year { min-width: 0; }
      .jd-columns { grid-template-columns: 1fr; }
      .jd-projects-grid { grid-template-columns: 1fr; }
    }

    /* ── JOURNEY DETAIL PANEL ── */
    .jd-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-top: 1.1rem;
      margin-bottom: 0.7rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .jd-position {
      font-size: 0.76rem;
      color: var(--fg);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .jd-duration {
      font-size: 0.67rem;
      color: var(--different1);
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .jd-lab {
      font-size: 0.69rem;
      color: #6b7280;
      letter-spacing: 0.02em;
      margin-bottom: 0.9rem;
    }

    .jd-columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 0.9rem;
    }

    .jd-col-label {
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.3rem;
    }

    .jd-col-value {
      font-size: 0.72rem;
      line-height: 1.55;
      color: var(--fg);
    }

    .jd-entry { margin-bottom: 0.35rem; line-height: 1.4; }
    .jd-entry:last-child { margin-bottom: 0; }
    .jd-entry span { display: block; font-size: 0.65rem; color: var(--muted); }

    .jd-projects {
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .jd-projects-label {
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.4rem;
    }

    .jd-projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 2rem;
    }

    .jd-project-item {
      font-size: 0.69rem;
      color: var(--muted);
      line-height: 1.4;
      display: flex;
      align-items: baseline;
      gap: 0.45rem;
    }

    .jd-project-item::before { content: '—'; color: #475569; flex-shrink: 0; font-size: 0.62rem; }
    .jd-project-name { flex: 1; }
    .jd-project-date { font-size: 0.62rem; color: #64748b; white-space: nowrap; }

    .jd-stats {
      display: flex;
      gap: 1.5rem;
      padding-top: 0.7rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .jd-stat { display: flex; flex-direction: column; gap: 0.05rem; }

    .jd-stat-num {
      font-size: 1rem;
      color: var(--different2);
      font-weight: 400;
      line-height: 1.2;
    }

    .jd-stat-tag {
      font-size: 0.57rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1 class="site-name">Deepayan Banik</h1>
        <p class="site-tagline">PhD Candidate · Atmospheric &amp; Planetary Physics · University of Toronto</p>
      </div>
      <nav>
        <button id="header-back-btn" class="back-btn" onclick="closeDetail()" style="display:none;">← Research</button>
        <button class="tab-btn active" data-tab="home">Home</button>
        <button class="tab-btn" data-tab="research">Research</button>
        <button class="tab-btn" data-tab="journey">Journey</button>
        <!-- <button class="tab-btn" data-tab="contact">Contact</button> -->
      </nav>
    </div>
  </header>

  <main>
    <section id="home" class="tab-content active"></section>
    <section id="research" class="tab-content"></section>
    <section id="journey" class="tab-content"></section>
    <section id="contact" class="tab-content"></section>
  </main>

  <footer>
    <p>&copy; 2025 Deepayan Banik · University of Toronto </p>
  </footer>

  <script>
    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tab).classList.add('active');
        if (tab === 'research') closeDetail();
      });
    });

    // ── Research detail pages ──
    function openDetail(area) {
      document.getElementById('research-overview').style.display = 'none';
      document.querySelectorAll('.detail-page').forEach(d => d.classList.remove('active'));
      document.getElementById('detail-' + area).classList.add('active');
      document.getElementById('header-back-btn').style.display = 'inline-flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeDetail() {
      document.querySelectorAll('.detail-page').forEach(d => d.classList.remove('active'));
      document.getElementById('research-overview').style.display = 'block';
      document.getElementById('header-back-btn').style.display = 'none';
    }

    // ── Journey click accordion (called after journey section loads) ──
    function initJourney() {
      document.querySelectorAll('.journey-item').forEach(item => {
        const header = item.querySelector('.journey-header');
        if (!header) return;
        header.addEventListener('click', () => {
          const isActive = item.classList.contains('active');
          document.querySelectorAll('.journey-item').forEach(i => i.classList.remove('active'));
          if (!isActive) item.classList.add('active');
        });
      });
    }

    // ── Contact form validation (called after contact section loads) ──
    function initContactForm() {
      const form = document.getElementById('contact-form');
      if (!form) return;
      form.addEventListener('submit', e => {
        e.preventDefault();
        let valid = true;

        const name = document.getElementById('name');
        const nameErr = document.getElementById('name-error');
        if (!name.value.trim()) { nameErr.textContent = 'Please enter your name.'; valid = false; }
        else { nameErr.textContent = ''; }

        const email = document.getElementById('email');
        const emailErr = document.getElementById('email-error');
        if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
          emailErr.textContent = 'Please enter a valid email address.'; valid = false;
        } else { emailErr.textContent = ''; }

        const msg = document.getElementById('message');
        const msgErr = document.getElementById('message-error');
        if (!msg.value.trim()) { msgErr.textContent = 'Please enter a message.'; valid = false; }
        else { msgErr.textContent = ''; }

        if (valid) {
          document.getElementById('form-status').textContent = 'Message sent! Thank you for reaching out.';
          form.reset();
        }
      });
    }

    // ── Load section partials ──
    async function loadSections() {
      await Promise.all(['home', 'research', 'journey', 'contact'].map(async id => {
        const res = await fetch('sections/' + id + '.html');
        document.getElementById(id).innerHTML = await res.text();
      }));
      initJourney();
      initContactForm();
    }

    loadSections();
  </script>
</body>
</html>
